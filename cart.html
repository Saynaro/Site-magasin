<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/cart.css">
    <title>Cart</title>
</head>
<body>
    <header>
        <img src="photo/Logo.png" alt="error" class ="logo">
        <a href="./main.html"><button class="catalog">Catalog</button></a>
        <form action="submit_search" method="get" id="search">
        <input type="search" name="search" id="search-input" placeholder="Search...">
        <a href="#" ><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 20" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg></a>
        </form>
        <a href="#" class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
        <a href="#" class="icon"> 
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg>
        </a>
        <a href="#" class="icon"> <!--Cart-->
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            <div class="quantity">0</div>
        </a>
    </header>
    <main>
        <h1>Votre panier</h1>
        <div class="cart">
            <div class="left-section">
                <div class="choisir-tous">
                    <div class="choisir-tous-input">
                        <input type="checkbox">
                        <p>Choisir tous</p>
                    </div>
                    <div class="choisir-tous-button">
                        <button class="button-share">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share2-icon lucide-share-2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
                            Share
                        </button>
                        <button class="button-delete-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2-icon lucide-trash-2"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
                <div class="items">

                </div>
            </div>

            <div class="right-section">
                <div class="button-acheter">
                    <button class="acheter">Continuer l'achat</button>
                    <p>Les modes et délais de livraison sont choisis à la commande.</p>
                </div>
                <div class="panier">
                    <div class="first-row">
                        <h3>Votre panier</h3>
                        <p class="quantity-items"></p>
                    </div>
                    <div class="second-row">
                        <p class="classic items-total"></p>
                        <p class="prix"><span class="items-prix"></span> €</p>
                    </div>
                    <div class="third-row">
                        <p class="classic">Livraison</p>
                        <p class="prix  prix-livraison">2.99 €</p>
                    </div>
                    <div class="fourth-row">
                        <p class="classic">Prix totale:</p>
                        <p class="prix prix-total">40 €</p>
                    </div>
                </div>
            </div>
     </div>
    </main>
    <script type="module" src="./scripts/cart.js"></script>
</body>
</html>
