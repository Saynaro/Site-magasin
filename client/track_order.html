<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de commande - Magasin</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/track_order.css">
</head>
<body style="background-color: #f5f5f7;">
    <header style="border-bottom: 1px solid #e0e0e0; margin-bottom: 0;">
        <div class="first-column">
            <a href="index.html"><img src="photo/Logo.png" alt="error" class="logo"></a>
        </div>
        <div class="second-column">
            <a href="index.html" class="icon" title="Retour à l'accueil">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-home"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <a href="cart.html" class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                <div class="quantity">0</div>
            </a>
        </div>
    </header>

    <main class="page-container">
        <div class="page-header">
            <a href="orders.html" class="back-link">‹ Retour aux commandes</a>
            <h1 id="track-title">Suivi de commande</h1>
        </div>
        <div id="track-container" style="display:none;">
            <div class="tracker-card">
                <div class="tracker-header">
                    <h2>Statut de la livraison: <span id="delivery-status"></span></h2>
                    <p>Commande n° <span id="order-id"></span></p>
                </div>
                
                <div class="timeline">
                    <div class="timeline-bar"></div>
                    <div class="timeline-progress" id="timeline-progress" style="width:0%;"></div>
                    <div class="status-points" id="status-points">
                        <!-- JS injected -->
                    </div>
                </div>
            </div>
            
            <div class="order-details-card" style="margin-top: 20px;">
                <h3 style="margin-top:0; font-size:18px;">Détails de la livraison</h3>
                <p style="margin: 10px 0;"><strong style="color:#555">Adresse:</strong> <span id="delivery-address"></span></p>
                
                <div class="items-list" id="ordered-items">
                    <!-- JS Injected -->
                </div>
            </div>
        </div>
        
        <div id="error-container" style="display:none; text-align:center; padding: 50px;">
            <h2 style="color:red;">Commande introuvable</h2>
            <p>Veuillez vérifier le numéro de la commande.</p>
            <a href="orders.html" class="back-link" style="margin-top:20px;">Retour à vos commandes</a>
        </div>
    </main>

    <script>
window.API_URL = window.API_URL || (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://' + window.location.hostname + ':3000' : 'https://magasinproject.onrender.com');
</script>
<script type="module" src="./scripts/login.js"></script>
    <script type="module" src="./scripts/track_order.js"></script>
</body>
</html>
