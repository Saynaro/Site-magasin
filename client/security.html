<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion & Sécurité - Magasin</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/settings.css">
</head>
<body style="background-color: #f5f5f7;">
    <header style="border-bottom: 1px solid #e0e0e0; margin-bottom: 0;">
        <div class="first-column">
            <a href="index.html"><img src="photo/Logo.png" alt="error" class="logo"></a>
        </div>
        <div class="second-column">
            <a href="index.html" class="icon" title="Retour à l'accueil">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-home"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <a href="cart.html" class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                <div class="quantity">0</div>
            </a>
        </div>
    </header>

    <main class="page-container">
        <div class="page-header">
            <a href="account.html" class="back-link">‹ Retour au compte</a>
            <h1>Connexion & Sécurité</h1>
        </div>
        
        <div class="settings-card">
            <!-- Name -->
            <div class="sec-row">
                <div class="sec-info">
                    <strong>Nom</strong>
                    <p id="display-name">Chargement...</p>
                </div>
                <button class="sec-edit-btn" onclick="document.getElementById('edit-name').style.display='block'">Modifier</button>
            </div>
            <div class="sec-edit-form" id="edit-name" style="display:none;">
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px;">Nouveau nom</label>
                <input type="text" id="input-name" class="sec-input">
                <button class="btn-primary" id="save-name">Enregistrer les modifications</button>
                <button class="btn-secondary" onclick="document.getElementById('edit-name').style.display='none'">Annuler</button>
            </div>

            <!-- Email -->
            <div class="sec-row">
                <div class="sec-info">
                    <strong>E-mail</strong>
                    <p id="display-email">Chargement...</p>
                </div>
                <button class="sec-edit-btn" onclick="document.getElementById('edit-email').style.display='block'">Modifier</button>
            </div>
            <div class="sec-edit-form" id="edit-email" style="display:none;">
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px;">Nouvelle adresse e-mail</label>
                <input type="email" id="input-email" class="sec-input">
                <button class="btn-primary" id="save-email">Enregistrer les modifications</button>
                <button class="btn-secondary" onclick="document.getElementById('edit-email').style.display='none'">Annuler</button>
            </div>

            <!-- Password -->
            <div class="sec-row">
                <div class="sec-info">
                    <strong>Mot de passe</strong>
                    <p>********</p>
                </div>
                <button class="sec-edit-btn" onclick="if(window.showGlobalToast) window.showGlobalToast('Fonctionnalité de réinitialisation de mot de passe en cours de développement.')">Modifier</button>
            </div>
        </div>
    </main>

    <script type="module" src="./scripts/login.js"></script>
    <script type="module" src="./scripts/security.js"></script>
</body>
</html>
