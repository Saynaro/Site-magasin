<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nous contacter - Magasin</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/settings.css">
</head>
<body style="background-color: #f5f5f7;">
    <header style="border-bottom: 1px solid #e0e0e0; margin-bottom: 0;">
        <div class="first-column">
            <a href="index.html"><img src="photo/Logo.png" alt="error" class="logo"></a>
        </div>
        <div class="second-column">
            <a href="index.html" class="icon" title="Retour à l'accueil">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-home"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <a href="cart.html" class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                <div class="quantity">0</div>
            </a>
        </div>
    </header>

    <main class="page-container" style="max-width: 800px;">
        <div class="page-header">
            <a href="account.html" class="back-link">‹ Retour au compte</a>
            <h1>Nous contacter</h1>
        </div>
        
        <div class="settings-card" style="display: flex; flex-direction: column; gap: 20px;">
            <p style="font-size:16px; color:#333; margin:0;">Notre service client est à votre disposition 7j/7, de 8h à 22h.</p>
            
            <div style="background:#fff; padding:20px; border-radius:8px; border:1px solid #ddd; display:flex; gap:15px; align-items:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#005bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-phone-call"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/><path d="M14.05 2a9 9 0 0 1 8 7.94"/><path d="M14.05 6A5 5 0 0 1 18 10"/></svg>
                <div>
                    <h3 style="margin:0 0 5px 0;">Par téléphone</h3>
                    <p style="margin:0; font-size:22px; font-weight:bold; color:#111;">+33 6 51 60 43 16 <span style="font-size:14px; color:#666; font-weight:normal;">(Appel gratuit)</span></p>
                </div>
            </div>
            
            <div style="background:#fafafa; padding:25px; border-radius:8px; border:1px solid #ddd;">
                <h3 style="margin:0 0 15px 0;">Envoyer un message au support</h3>
                <input type="text" class="sec-input" placeholder="Objet de votre demande" style="margin-bottom:15px;">
                <textarea class="sec-input" rows="6" placeholder="Expliquez-nous votre problème en détail..." style="resize:vertical; margin-bottom:15px;"></textarea>
                <button class="btn-primary" onclick="if(window.showGlobalToast) window.showGlobalToast('Votre message a été envoyé avec succès ! Notre équipe vous répondra sous 24h.')">Envoyer le message</button>
            </div>
        </div>
    </main>

    <script>
window.API_URL = window.API_URL || (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://' + window.location.hostname + ':3000' : 'https://magasinproject.onrender.com');
</script>
<script type="module" src="./scripts/login.js"></script>
    <script>
        import { cart, initCart } from './data/cart.js';
        await initCart();
        // Update cart quantity
        
        let cartTotal = 0;
        cart.forEach(c => cartTotal += c.quantity);
        const qEl = document.querySelector('.quantity');
        if (qEl) qEl.innerHTML = cartTotal;
    </script>
</body>
</html>
